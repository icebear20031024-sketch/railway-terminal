worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;

        location /proxy {
            proxy_redirect off;
            proxy_pass http://127.0.0.1:10000;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;
            tcp_nodelay on;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /ws {
            proxy_redirect off;
            proxy_pass http://127.0.0.1:10000/proxy;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;
            tcp_nodelay on;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /api/ws {
            proxy_redirect off;
            proxy_pass http://127.0.0.1:10000/proxy;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;
            tcp_nodelay on;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /sub {
            default_type text/plain;
            return 200 "dmxlc3M6Ly9iMjVlYmViNS0xODViLTQ2NjYtYjNiYi05YTliM2NmMGFkOWFAcmFpbHdheS10ZXJtaW5hbC1wcm9kdWN0aW9uLnVwLnJhaWx3YXkuYXBwOjQ0Mz9lbmNyeXB0aW9uPW5vbmUmc2VjdXJpdHk9dGxzJnR5cGU9d3MmaG9zdD1yYWlsd2F5LXRlcm1pbmFsLXByb2R1Y3Rpb24udXAucmFpbHdheS5hcHAmcGF0aD0lMkZwcm94eSNyYWlsd2F5LXRlcm1pbmFsCg==\n";
        }

        location / {
            proxy_pass http://127.0.0.1:7681;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
